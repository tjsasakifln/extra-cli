# Legacy free-string aliases mapped to test_id (migration only; never executed as shell).
legacy_command_aliases:
  "python -m pytest tests/cto -q": cto.pytest.suite
  "python3 -m pytest tests/cto -q": cto.pytest.suite
  "python -m pytest tests/cto -q -o addopts=": cto.pytest.suite
  "python3 -m pytest tests/cto -q -o addopts=": cto.pytest.suite
  "python -m pytest tests/cto/test_verifier.py -q": cto.pytest.verifier
  "python -m pytest tests/cto/test_publisher.py -q": cto.pytest.publisher
  "python -m pytest tests/cto/test_decision_schema.py -q": cto.pytest.decision_schema
  "python -m pytest tests/cto/test_executive_sync.py -q": cto.pytest.executive_sync
  "python -m pytest tests/cto/test_github_issues.py -q": cto.pytest.github_issues
  "python -m pytest tests/cto/test_deepseek_client.py -q": cto.pytest.deepseek_client
  "python -m scripts.cto.cli doctor": cto.cli.doctor
  "python3 -m scripts.cto.cli doctor": cto.cli.doctor
  "grep -qi canary docs/ops/cto-autopilot/canary-proof.md": cto.canary.proof_grep
  "python -m pytest tests/ -q --tb=no -x": project.pytest.critical
  "python -m pytest tests/ -q --tb=line": project.pytest.selective_line
  "python -m scripts.ops.source_contract_tests --json": ops.source_contract
  "python -m pytest tests/test_decision_loop_v2.py -q": decision.loop.v2
