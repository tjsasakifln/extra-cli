# Human-versioned registry of authorized verifier test commands.
# DeepSeek and Grok may select only test_id values — never free-form shell.
# argv is always executed with shell=False; unknown IDs are rejected.
schema_version: "1.0"

tests:
  - test_id: cto.pytest.suite
    argv: ["python3", "-m", "pytest", "tests/cto", "-q", "-o", "addopts="]
    cwd: repo_root
    timeout_sec: 600
    env_allowlist: ["PATH", "HOME", "LANG", "LC_ALL", "PYTHONPATH", "VIRTUAL_ENV", "TMPDIR"]
    needs_db: false
    network: deny
    expected_files: []
    risk_class: low
    description: Full CTO unit suite

  - test_id: cto.pytest.verifier
    argv: ["python3", "-m", "pytest", "tests/cto/test_verifier.py", "-q", "-o", "addopts="]
