# Extra Consultoria — journald retention (DoD §23)
# Install on host (VPS/local with systemd):
#   sudo cp config/journald/00-extra-consultoria.conf \
#     /etc/systemd/journald.conf.d/00-extra-consultoria.conf
#   sudo systemctl restart systemd-journald
#
# Project-owned source of truth for retention parameters.
# Local stage: presence + validation of this file counts as "configured"
# (applied on host at PRE_VPS / VPS stages).

[Journal]
# Cap total journal disk use
SystemMaxUse=500M
RuntimeMaxUse=100M
# Retain ~14 days of logs when under size caps
MaxRetentionSec=14day
# Compress older journals
Compress=yes
# Forward to syslog only if already enabled on host (no silent enable)
# ForwardToSyslog=no
