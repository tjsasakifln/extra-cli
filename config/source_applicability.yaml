# =============================================================================
# Source Applicability + Required Combinations — CANONICAL AUTHORITY
# =============================================================================
# Single authority for dual capability coverage (ADR-030 / DUAL-CAPABILITY-*).
# Engine MUST load this document; DEFAULT_REQUIRED_SOURCES is non-canonical.
#
# status=draft never forms a valid denominator.
# status=active requires policy_version, validated_*, owner, rationale, sha256.
# policy_sha256 is computed over this document excluding the policy_sha256 field
# itself (see scripts.coverage.source_policy.compute_policy_sha256).
# =============================================================================

policy_version: "2.1.0"
version: "2.1.0"
updated_at: "2026-07-22"
status: active
validated_at: "2026-07-22T15:00:00Z"
validated_by: "historical-contracts-operational-closure-01"
owner: "coverage-governance"
rationale: >
  Activate entity×source×capability applicability and explicit required
  combinations so dual coverage cannot claim readiness from draft policy or
  silent pncp-only fallback. Municipal open_tenders requires pncp+ciga_ckan;
  federal/estadual open_tenders requires pncp; historical_contracts requires
  pncp+contracts for all spheres including esfera-agnostic multi-nature entities
  (consórcios, SEM, EP, SSA) via attribute-derived esfera and a documented
  wildcard combination (same sources for all spheres). Esfera is never hardcoded
  per entity id. Semantic roles: pncp = official federal catalog authority;
  contracts = historical contracts capability surface on that authority (same
  PNCP /contratos origin, two audit roles — not two independent fetches).
policy_sha256: "f090ff87dbd2d073fb5c7ca89d42bda690deffb7656e6bde8fa2c01446b492e2"

# -----------------------------------------------------------------------------
# Source roles per capability (complementary never satisfies required)
# -----------------------------------------------------------------------------
source_roles:
  open_tenders:
    pncp: required
    ciga_ckan: required
    sc_compras: complementary
    dom_sc: gap_fill
    pcp: complementary
    compras_gov: complementary
    transparencia: informational
    tce_sc: complementary
    doe_sc: complementary
    mides_bigquery: complementary
  historical_contracts:
    pncp: required
    contracts: required
    compras_gov: complementary
    tce_sc: complementary

# -----------------------------------------------------------------------------
# Required combinations (ordered alternatives). Match most specific first.
# selection: first fully applicable combination (deterministic sort in engine).
# -----------------------------------------------------------------------------
required_combinations:
  open_tenders:
    - match: {esfera: municipal, natureza: "*"}
      combinations:
        - [pncp, ciga_ckan]
    - match: {esfera: estadual, natureza: "*"}
      combinations:
        - [pncp]
        - [pncp, sc_compras]
    - match: {esfera: federal, natureza: "*"}
      combinations:
        - [pncp]
  historical_contracts:
    # Identical required set for every sphere — wildcard is lowest-specificity
    # fallback so multi-sphere natures (SEM/EP/consórcio/SSA) without derived
    # esfera still get a combination without inventing sphere-specific sources.
    - match: {esfera: "*", natureza: "*"}
      combinations:
        - [pncp, contracts]
    - match: {esfera: municipal, natureza: "*"}
      combinations:
        - [pncp, contracts]
    - match: {esfera: estadual, natureza: "*"}
      combinations:
        - [pncp, contracts]
    - match: {esfera: federal, natureza: "*"}
      combinations:
        - [pncp, contracts]

# Regras de aplicabilidade por fonte
sources:

  # --------------------------------------------------------------------------
  # PNCP API (federal + adesao voluntaria)
  # --------------------------------------------------------------------------
  pncp:
    display_name: "PNCP API"
    authority_level: federal
    sla_hours: 4
    default_applicable: true
    rules:
      - filter: {esfera: "*", natureza: "*", plataforma: "*"}
        applicable: true
        priority: 0
        reason: "Fonte federal com adesao voluntaria de todas as esferas e naturezas"
    notes:
      - "Cobre entes que aderem voluntariamente ao PNCP — maioria dos municipios de SC"
      - "Fonte primaria para open_tenders e historical_contracts"

  # --------------------------------------------------------------------------
  # DOM-SC (Diario Oficial dos Municipios de SC)
  # --------------------------------------------------------------------------
  dom_sc:
    display_name: "DOM-SC"
    authority_level: municipal
    sla_hours: 24
    default_applicable: false
    rules:
      - filter: {esfera: municipal, natureza: "*", plataforma: "*"}
        applicable: true
        priority: 10
        reason: "Diario oficial dos municipios de SC"
      - filter: {esfera: estadual, natureza: "*", plataforma: "*"}
        applicable: false
        priority: 10
        reason: "DOM-SC nao cobre entes estaduais"
      - filter: {esfera: federal, natureza: "*", plataforma: "*"}
        applicable: false
        priority: 10
        reason: "DOM-SC nao cobre entes federais"
    notes:
      - "Path legado autenticado (diariomunicipal.sc.gov.br) — opcional"
      - "Caminho canônico público: ciga_ckan em dados.ciga.sc.gov.br (sem API key)"
      - "Cobertura apenas de municipios de SC"

  # --------------------------------------------------------------------------
  # PCP (Portal de Compras Publicas)
  # --------------------------------------------------------------------------
  pcp:
    display_name: "Portal de Compras Publicas"
    authority_level: multi
    sla_hours: 24
    default_applicable: true
    rules:
      - filter: {esfera: "*", natureza: "*", plataforma: "*"}
        applicable: true
        priority: 0
        reason: "Plataforma multiestadual com ampla cobertura"
    notes:
      - "Multiplataforma: cobre licitacoes de varios estados"
      - "Fonte secundaria para open_tenders"

  # --------------------------------------------------------------------------
  # ComprasGov (compras federais)
