# Perfil operacional Extra Construtora — versionado (task I4.1 / DoD §2.5)
# Alterações de perfil NÃO devem espalhar regras no código; só este arquivo.

profile_id: extra_construtora
display_name: Extra Empreiteira e Construtora
version: 2
version_date: "2026-07-16"
version_notes: "I4.1 — perfil operacional completo para janela 30d (região, modalidades, valores, restrições)"

# --- Região e universo ---
region:
  uf_primary: SC
  radius_km: 200
  universe_seed: "Extra - alvos de licitação. R-0.xlsx"
  universe_authority: spreadsheet_canonical
  # denominador de metas: entes included no raio (baseline 1093 na planilha atual)

desired_object_types:
  - id: reforma_predial
    label: Reforma predial
    terms:
      - reforma predial
      - reforma de edificio publico
      - reforma de edificacao publica
  - id: manutencao_predial
    label: Manutenção predial
    terms:
      - manutencao predial
      - manutencao de edificio publico
      - manutencao de edificacao publica
  - id: construcao_edificios_publicos
    label: Construção de edifícios públicos
    terms:
      - construcao de edificio publico
      - construcao de edificacao publica
      - construcao de predio publico
  - id: infraestrutura_urbana
    label: Infraestrutura urbana (obras correlatas)
    terms:
      - pavimentacao
      - drenagem
      - calcada
      - revitalizacao urbana

positive_terms:
  - engenharia civil
  - obra de engenharia
  - reforma
  - manutencao predial
  - construcao de edificio
  - edificacao
  - predial

# Sem termos negativos comerciais rígidos do cliente nesta fase.
negative_terms: []

# Modalidades priorizadas (não exclusivas) — null = todas aceitas no score base
allowed_modalities: null
priority_modalities:
  - pregao_eletronico
  - concorrencia
  - tomada_de_precos
  - dispensa
  - inexigibilidade

priority_municipalities: []
priority_distance_km: 200

# Faixas de valor (R$) — nulo = sem corte duro; scoring usa soft fit
minimum_value: null
maximum_value: null
# Soft guidance for reports (not hard block)
value_band_soft:
  min_brl: 50000
  max_brl: 50000000
  note: "Faixa operacional típica de obras/serviços de engenharia; calibrar com Tiago"

minimum_days_to_deadline: null

documents:
  require_official_notice: false
  require_attachments: false

engineering_categories:
  - reforma_predial
  - manutencao_predial
  - construcao_edificios_publicos
  - infraestrutura_urbana

# Restrições operacionais conhecidas
operational_constraints:
  - id: radius_200km
    description: Somente entes no raio 200 km da planilha canônica
  - id: no_obra_acompanhamento
    description: Fora de escopo acompanhamento físico/financeiro de obra
  - id: single_user
    description: Ferramenta pessoal single-user (Tiago)

# Órgãos prioritários (preencher/expandir com alinhamento comercial)
priority_organs: []

# Concorrentes indicados pelo cliente (CNPJ quando conhecido)
known_competitors: []

hard_blocks:
  require_within_radius: true
  require_future_deadline: true
  exclude_terminal_or_suspended: true
  require_official_url: false

weights:
  data_confidence:
    official_source: 15
    status_evidence: 25
    future_deadline: 20
    official_url: 10
    entity_match: 15
    freshness: 10
    field_completeness: 5
  client_fit:
    desired_object_type: 40
    positive_terms: 20
    distance: 20
    modality: 5
    deadline: 5
    documents: 10

triage_thresholds:
  priority_min_data_confidence: 70
  priority_min_client_fit: 55
  discard_max_client_fit: 20

# Fontes preferenciais para open_tenders (ordem de confiança operacional)
preferred_sources:
  open_tenders:
    - pncp
    - pcp
    - compras_gov
    - ciga_ckan
    - tce_sc
  historical_contracts:
    - pncp
    - contracts
    - tce_sc
