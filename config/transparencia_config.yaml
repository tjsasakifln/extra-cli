# Transparencia Config — Extra Consultoria
# Configuracao template-driven para crawling de portais de transparencia municipais.
#
# Cada municipio mapeado tem:
#   - ibge: codigo IBGE de 7 digitos
#   - portal_url: URL do portal de transparencia
#   - template: qual template de seletor usar (portal_transparencia_net, e_gov_net, custom)
#   - selectors: (apenas para template: custom) seletores CSS especificos
#
# Templates definem os seletores CSS para extrair dados das paginas HTML.

templates:
  portal_transparencia_net:
    name: "Portal Transparencia .NET"
    description: "Template mais comum em municipios de SC — tabela .licitacao"
    selectors:
      lista_licitacoes: "table.licitacao"
      modalidade: "td:nth-child(2)"
      data: "td:nth-child(1)"
      objeto: "td:nth-child(3)"
      orgao: "td:nth-child(4)"
      valor: "td:nth-child(5)"
      link: "a"

  e_gov_net:
    name: "e-Gov .NET"
    description: "Segundo mais comum — plataforma e-gov da Betha"
    selectors:
      lista_licitacoes: "div.lista-licitacoes table"
      modalidade: "td:nth-child(1)"
      data: "td:nth-child(2)"
      objeto: "td:nth-child(3)"
      valor: "td:nth-child(4)"
      link: "a"

  custom:
    name: "Custom (HTML scraping especifico)"
    description: "Template customizado — requer selectors definidos por municipio"
    selectors: {}  # Preenchido por entrada em municipios[].selectors

# Municipios com portal de transparencia mapeado.
# Preencher com base na baseline de cobertura (Story 001.5).
# Formato:
#   <slug_municipio>:
#     ibge: "<codigo_ibge_7digitos>"
#     portal_url: "<url_completa_do_portal>"
#     template: "<nome_do_template>"
#     selectors: {}  # Opcional — apenas para template: custom
#     ativo: true    # Opcional — false para desabilitar temporariamente

municipios:
  # Betha / portal_transparencia_net (padrao atende.net)
  chapeco:
    ibge: "4204202"
    portal_url: "https://chapeco.atende.net/transparencia"
    template: "portal_transparencia_net"
    requires_js: true    # Portal com JS que requer Selenium
    wait_for: "table.licitacao"
    ativo: true

  sao-jose:
    ibge: "4216602"
    portal_url: "https://sao-jose.atende.net/transparencia"
    template: "portal_transparencia_net"
    requires_js: true
    wait_for: "table.licitacao"
    ativo: true

  blumenau:
    ibge: "4202404"
    portal_url: "https://blumenau.atende.net/transparencia"
    template: "portal_transparencia_net"
    requires_js: false   # HTML estatico, usa HTTP
    ativo: true

  # Ipam / ipm.org.br
  itajai:
    ibge: "4208203"
    portal_url: "https://itajai.ipm.org.br/transparencia"
    template: "portal_transparencia_net"
    requires_js: false
    ativo: true

  criciuma:
    ibge: "4204608"
    portal_url: "https://criciuma.ipm.org.br/transparencia"
    template: "portal_transparencia_net"
    requires_js: false
    ativo: true

  lages:
    ibge: "4209300"
    portal_url: "https://lages.ipm.org.br/transparencia"
    template: "portal_transparencia_net"
    requires_js: false
    ativo: true

  # E-gov / e_gov_net (Betha e-gov)
  florianopolis:
    ibge: "4205407"
    portal_url: "https://florianopolis.e-gov.betha.com.br"
    template: "e_gov_net"
    requires_js: true
    wait_for: "div.lista-licitacoes"
    ativo: true

  joinville:
    ibge: "4209102"
    portal_url: "https://joinville.e-gov.betha.com.br"
    template: "e_gov_net"
    requires_js: true
    wait_for: "div.lista-licitacoes"
    ativo: true

  balneario-camboriu:
    ibge: "4202008"
    portal_url: "https://balneario-camboriu.e-gov.betha.com.br"
    template: "e_gov_net"
    requires_js: false
    ativo: true

  # Custom (dominio proprio .gov.br, scraping especifico)
  tubarao:
    ibge: "4218700"
    portal_url: "https://tubarao.sc.gov.br"
    template: "custom"
    requires_js: false   # HTML estatico
    selectors:
      lista_licitacoes: "table.table-licitacoes"
    ativo: true

  brusque:
    ibge: "4202909"
    portal_url: "https://brusque.sc.gov.br"
    template: "custom"
    requires_js: false
    selectors:
      lista_licitacoes: "table.table-licitacoes"
    ativo: true

  rio-do-sul:
    ibge: "4214805"
    portal_url: "https://riodosul.sc.gov.br"
    template: "custom"
    requires_js: false
    selectors:
      lista_licitacoes: "table.table-licitacoes"
    ativo: true
