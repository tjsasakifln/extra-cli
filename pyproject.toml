[tool.ruff]
# Ruff configuration — Story TD-4.2 (CI/CD Pipeline)
target-version = "py312"
line-length = 120

# Enable pycodestyle (E), pyflakes (F), isort (I), and a curated set of non-controversial rules
lint.select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (logic errors)
    "I",   # isort (import ordering)
    "N",   # pep8-naming (naming conventions)
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade (modern Python idioms)
]
lint.ignore = [
    "E501",  # Line too long — handled by formatter
    "N802",  # Allow lowercase function names for internal helpers
    "N999",  # Allow hyphens in module names (e.g. war-room-b2g-collect)
]

# Allow unused imports in __init__.py
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"scripts/collect_report_data.py" = ["N806", "F841"]
"scripts/collect-report-data.py" = ["N806", "F841"]
"scripts/intel_report.py" = ["N806", "F841", "E402"]
"scripts/intel-report.py" = ["N806", "F841", "E402"]
"scripts/intel_excel.py" = ["N806", "F841", "E402", "E741"]
"scripts/intel-excel.py" = ["N806", "F841", "E402", "E741"]
"scripts/intel_pipeline.py" = ["N806", "F841", "E402"]
"scripts/generate_proposta_pdf.py" = ["N806", "F841"]
"scripts/generate-proposta-pdf.py" = ["N806", "F841"]
"scripts/reports/coverage_weekly.py" = ["N806", "F841"]
"scripts/collect-metrics.py" = ["E402"]
"scripts/intel-enrich.py" = ["E402"]
"scripts/intel-validate.py" = ["E402"]
"scripts/intel_validate.py" = ["E402"]
"scripts/health-dashboard.py" = ["E402"]
"scripts/notify.py" = ["E402"]
"scripts/intel-analyze.py" = ["E402"]
"scripts/intel_llm_gate.py" = ["E402"]
"scripts/check-alerts.py" = ["E402"]
"scripts/pipeline/backfill_multi_source.py" = ["E402"]
"scripts/crawl/batch_detect_platforms.py" = ["E402"]
"scripts/crawl/batch_detect_platforms_pass2.py" = ["E402"]
"scripts/crawl/generate_transparencia_config.py" = ["E402"]
"scripts/crawl/monitor.py" = ["E402"]
"scripts/export-sc-200km-final.py" = ["E402"]
"scripts/fix/activate_dormant_sources.py" = ["E402"]
"scripts/fix/resolve_unresolved_entities.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_unused_ignores = true

# Explicit strict flags (not using strict=true to avoid blanket checks on dependencies)
check_untyped_defs = true
warn_return_any = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
strict_equality = true

# Disable type-arg warnings — dynamic dict shapes are idiomatic in data pipelines
disable_error_code = "type-arg"

# Module-level overrides for 3rd-party packages
[[tool.mypy.overrides]]
module = [
    "psycopg2.*",
    "httpx.*",
    "requests.*",
    "supabase.*",
    "rich.*",
    "argparse",
    "urllib3.*",
    "rapidfuzz.*",
    "difflib",
]
ignore_missing_imports = true

# Config for modules we don't control (lenient)
[[tool.mypy.overrides]]
module = [
    "tests.*",
    "scripts.reports.*",
    "scripts.lib.*",
]
ignore_errors = true

[tool.bandit]
# Regra #10 (B2G-4): bandit scoped to production code only
exclude_dirs = ["tests", "tests/fixtures"]
skips = []
