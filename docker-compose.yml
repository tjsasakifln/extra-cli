# PostgreSQL + PostGIS for integration tests
# Usage:
#   docker compose up -d test-db
#   TEST_DSN=postgresql://test:test@localhost:5433/extra_test pytest -m integration
#   docker compose down

services:
  test-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: extra_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d extra_test"]
      interval: 2s
      timeout: 5s
      retries: 10
