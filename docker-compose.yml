# PostgreSQL + PostGIS — banco local persistente
# Usage:
#   docker compose up -d test-db
#   docker compose down
#
# Databases:
#   extra_test     — integration tests (tmpfs, volatile)
#   pncp_datalake  — production data (volume, persistent)
#
# Connection strings:
#   DATABASE_URL=postgresql://test:test@localhost:5433/pncp_datalake
#   TEST_DSN=postgresql://test:test@localhost:5433/extra_test

services:
  test-db:
    # pgvector/pgvector:pg16 includes PostGIS-compatible stack + extension vector
    # (migration 014 requires CREATE EXTENSION vector). postgis/postgis alone BLOCKS fresh install.
    # Evidência campanha 30d: docs/baseline/l1-fresh-migrations.md (PE-L1-01).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: extra_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d extra_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    driver: local
