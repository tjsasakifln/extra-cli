# CI Pipeline — Extra Consultoria
#
# Runs on every push to main and every pull_request (including stacked PRs
# whose base is not main). Selective jobs give fast feedback; test-all is the
# mandatory full suite and is never silently skipped on PRs.
#
# Story TD-4.2: Setup CI/CD Pipeline
# Debts: TD-OPS-01, TD-SYS-015
#
# Regra #10 (B2G-4): Gates fail-closed — bandit, pip-audit, coverage threshold
# NENHUM job usa continue-on-error:true ou || true
# SKIPPED full suite is NOT equivalent to PASS.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    # No branches filter: stacked PRs (base ≠ main) must still run full suite.
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # LINT — ruff
  # ============================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run ruff linter
        # Framework/agent assets are vendored tooling. Product lint debt is
        # tracked under TD-7.1, so the blocking gate targets production code.
        run: ruff check scripts/

  # ============================================================================
  # TYPE CHECK — mypy
  # ============================================================================
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy type check
        # Start strict typing at the current business-critical boundary and
        # expand it module-by-module under TD-7.1. Resilience modules included.
        run: |
          mypy \
            scripts/freshness_gate.py \
            scripts/lib/universe.py \
            scripts/opportunity_intel/models.py \
            scripts/opportunity_intel/status.py \
            scripts/opportunity_intel/ranking.py \
            scripts/opportunity_intel/dedup.py \
            scripts/opportunity_intel/transformer.py
          mypy --follow-imports=skip \
            scripts/crawl/ingestion/_base/crawler.py \
            scripts/crawl/resilience \
            scripts/ops/resilient_cycle.py \
            scripts/ops/health.py

  # ============================================================================
  # TEST — critical readiness regression suite
  # ============================================================================
  test:
    name: Test (critical readiness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run critical readiness tests with coverage
        run: >-
          pytest
          tests/test_freshness_gate.py
          tests/test_universe.py
          tests/test_manifest.py
          tests/test_consulting_readiness.py
          tests/test_coverage_truth.py
          tests/test_resolve_unresolved_entities.py
          tests/test_golden_path_fail_closed.py
          tests/test_golden_path_ledger.py
          tests/test_contracts_window_complete.py
          tests/test_contracts_pilot_completion.py
          tests/test_evidence_artifact_consistency.py
          tests/test_cross_source_hash.py
          tests/test_commercial_sample_sc.py
          tests/test_run_evidence.py
          tests/test_contract_date_semantics.py
          tests/test_dados_abertos_sc_crawler.py
          tests/test_act_classifier.py
          tests/test_smoke_pncp_public.py
          tests/test_sc_compras_smoke.py
          tests/test_contracts_uf_filter.py
          tests/test_mandatory_gates_no_or_true.py
          tests/test_weekly_cycle.py
          -m "not integration and not database and not live"
          -o addopts=''
          --cov=scripts.freshness_gate
          --cov=scripts.lib.universe
          --cov=scripts.consulting_readiness
          --cov=scripts.coverage_truth
          --cov=scripts.golden_path
          --cov=scripts.crawl.run_contracts_90d_pilot
          --cov=scripts.crawl.act_classifier
          --cov=scripts.crawl.date_semantics
          --cov=scripts.crawl.run_evidence
          --cov=scripts.reports.commercial_sample_sc
          --cov=scripts.ops.weekly_cycle
          --cov=scripts.collect.run_contract
          --cov=scripts.quality.indicator_catalog
          --cov-report=term-missing
          --cov-report=html:docs/td-001/coverage-reports/
          --cov-fail-under=10
          --tb=short
          -v
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: docs/td-001/coverage-reports/
          retention-days: 14

  # ============================================================================
  # TEST ALL — inclui integration, smoke, slow (gate completo)
  # ============================================================================
  # Expanded operational suite on every PR (fail-closed, explicit file list).
  # Intentionally NOT "all non-integration tests": full collection still has residual
  # debt (schema/env). Residual isolations: docs/ops/campaigns/EXTRA-OPERATIONAL-PROOF-01/STATUS.md
  test-operational-expanded:
    name: Test operational expanded (PR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Operational expanded unit suite
        run: >-
          pytest
          tests/test_weekly_cycle.py
          tests/test_run_evidence.py
          tests/test_freshness_gate.py
          tests/test_mandatory_gates_no_or_true.py
          tests/test_golden_path_fail_closed.py
          tests/test_golden_path_ledger.py
          tests/test_evidence_artifact_consistency.py
          tests/test_contract_date_semantics.py
          tests/test_coverage_truth.py
          tests/test_consulting_readiness.py
          -m "not integration and not database and not slow and not e2e and not live"
          -o addopts=''
          --cov=scripts.ops.weekly_cycle
          --cov=scripts.collect.run_contract
          --cov=scripts.quality.indicator_catalog
          --cov=scripts.crawl.run_evidence
          --cov-report=term-missing
          --cov-fail-under=35
          --tb=short
          -v
        env:
          CI: true

  test-all:
    name: Test All (full suite)
    # Mandatory on every PR (incl. stacked) and main push. Never treat SKIPPED as green.
    # Postgres service covers database-marked tests; true external live/e2e remain
    # environment-gated by the tests themselves (not silently skipped by this job).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: extra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d extra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LOCAL_DATALAKE_DSN: postgresql://test:test@127.0.0.1:5432/extra_test
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/extra_test
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov psycopg2-binary

      - name: Apply migrations (fail-closed)
        run: python3 -m scripts.ops.apply_migrations --dsn "$LOCAL_DATALAKE_DSN"

      - name: Run ALL tests (full suite) and report count
        id: full_suite
        run: |
          set -euo pipefail
          OUT="$(mktemp)"
          # No path filters; no silent skip. Live/e2e that need secrets fail or self-skip inside tests.
          # Fail-closed: no `|| true` anywhere in this job.
          set -o pipefail
          pytest tests/ -m "" \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage-full.xml \
            --cov-fail-under=10 \
            -q --tb=line | tee "$OUT"
          SUMMARY="$(tail -n 5 "$OUT" | tr '\n' ' ')"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          if ! PASSED_LINE="$(grep -oE '[0-9]+ passed' "$OUT" | tail -1)"; then
            echo "Could not parse passed count from pytest output" >&2
            exit 1
          fi
          PASSED="$(echo "$PASSED_LINE" | grep -oE '[0-9]+')"
          echo "passed_count=$PASSED" >> "$GITHUB_OUTPUT"
          echo "Full suite passed_count=$PASSED"
          if [ "${PASSED}" -lt 1 ]; then
            echo "Full suite collected zero passing tests" >&2
            exit 1
          fi

      - name: Upload full-suite coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-coverage-${{ github.sha }}
          path: |
            coverage-full.xml
            htmlcov/
            docs/td-001/coverage-reports/
          if-no-files-found: ignore
          retention-days: 14

  # ============================================================================
  # RESILIENCE GATE — pre-VPS truth (fail-closed, no continue-on-error)
  # ============================================================================
  resilience-gate:
    name: Resilience Gate (pre-VPS)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image: migrations include CREATE EXTENSION vector
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pncp_datalake
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d pncp_datalake"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/pncp_datalake
      RESILIENCE_ENV: test
      RESILIENCE_REQUIRE_DB: "0"
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov psycopg2-binary prometheus_client

      - name: Ruff resilience modules
        run: >
          ruff check
          scripts/crawl/ingestion/_base/crawler.py
          scripts/crawl/resilience
          scripts/ops
          tests/test_local_resilience.py
          tests/test_resilience_vertical_slice.py

      - name: Mypy resilience modules
        run: >
          mypy --follow-imports=skip
          scripts/crawl/ingestion/_base/crawler.py
          scripts/crawl/resilience
          scripts/ops/resilient_cycle.py
          scripts/ops/health.py
          scripts/ops/validate_systemd.py

      - name: Validate systemd units
        run: python -m scripts.ops.validate_systemd

      - name: Migrations + resilience tests + fixture isolation (single step)
        # Single step keeps PG service state: restarts between steps can wipe ephemeral volumes.
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/pncp_datalake
          RESILIENCE_ENV: test
        run: |
          set -euo pipefail
          python -m scripts.ops.apply_migrations --mode fresh --min 1 --max 54
          python - <<'PY'
          import os, psycopg2, sys
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()
          cur.execute("SELECT current_database(), current_user")
          print("conn", cur.fetchone())
          cur.execute("SELECT count(*) FROM pg_tables WHERE schemaname='public'")
          n = cur.fetchone()[0]
          print("public_tables", n)
          cur.execute("SELECT 1 FROM pg_proc WHERE proname='upsert_pncp_raw_bids' LIMIT 1")
          has = cur.fetchone() is not None
          print("has_upsert", has)
          cur.close(); conn.close()
          if n < 1 or not has:
              sys.exit("schema verification failed after fresh migrations")
          PY
          # Upgrade path on a second database
          PGPASSWORD=test psql -h localhost -U test -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS pncp_upgrade;"
          PGPASSWORD=test psql -h localhost -U test -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE pncp_upgrade;"
          DATABASE_URL=postgresql://test:test@localhost:5432/pncp_upgrade \
            python -m scripts.ops.apply_migrations --mode fresh --min 1 --max 40
          DATABASE_URL=postgresql://test:test@localhost:5432/pncp_upgrade \
            python -m scripts.ops.apply_migrations --mode upgrade --min 41 --max 54
          # Unit/chaos offline
          pytest -o addopts='' -q \
            tests/test_local_resilience.py \
            tests/test_resilience_vertical_slice.py \
            tests/test_fetch_result.py \
            tests/test_watermark.py \
            tests/test_dlq.py \
            -m "not slow and not e2e and not database" \
            --tb=short
          # Real PG vertical slice — re-assert schema immediately before tests
          python - <<'PY'
          import os, psycopg2, sys
          dsn = os.environ["DATABASE_URL"]
          print("vertical_dsn", dsn)
          conn = psycopg2.connect(dsn)
          cur = conn.cursor()
          cur.execute("SELECT current_database(), current_user")
          print("vertical_conn", cur.fetchone())
          cur.execute("SELECT count(*) FROM pg_tables WHERE schemaname='public'")
          n = cur.fetchone()[0]
          print("vertical_public_tables", n)
          cur.close(); conn.close()
          if n < 1:
              # Re-apply if service volume was wiped
              import subprocess
              subprocess.check_call([sys.executable, "-m", "scripts.ops.apply_migrations", "--mode", "fresh", "--min", "1", "--max", "54"])
          PY
          RESILIENCE_REQUIRE_DB=1 DATABASE_URL="$DATABASE_URL" pytest -o addopts='' -q \
            tests/test_resilience_vertical_slice.py \
            -m "database and not slow" \
            --tb=short
          # Fixture cycle isolation
          export RESILIENCE_STATE_PATH="$RUNNER_TEMP/resilience-ci"
          export RESILIENCE_ENV=fixture
          export RESILIENCE_REQUIRE_DB=0
          export RESILIENCE_PAGE_SIZE=1
          export RESILIENCE_REQUEST_DELAY=0
          python -m scripts.ops.resilient_cycle --env fixture
          python -m scripts.ops.health --env fixture
          set +e
          python -m scripts.ops.health --env development
          code=$?
          set -e
          test "$code" -eq 2

      - name: Upload resilience artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resilience-gate-artifacts
          path: |
            output/resilience/
            ${{ runner.temp }}/resilience-ci/
          retention-days: 14
          if-no-files-found: ignore

  # ============================================================================
  # SECURITY — bandit (fail-closed, sem continue-on-error)
  # ============================================================================
  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run bandit security scan
        # Policy blocks HIGH findings; MEDIUM/LOW are tracked as technical debt.
        run: bandit -r scripts/ -lll -q

  # ============================================================================
  # DEPENDENCY AUDIT — pip-audit (fail-closed)
  # ============================================================================
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict
