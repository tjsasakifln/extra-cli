# CI Pipeline — Extra Consultoria
#
# Runs on every push to main and every PR targeting main.
# Stages: lint (ruff) -> type-check (mypy) -> test (pytest) + security (bandit)
#
# Story TD-4.2: Setup CI/CD Pipeline
# Debts: TD-OPS-01, TD-SYS-015
#
# Regra #10 (B2G-4): Gates fail-closed — bandit, pip-audit, coverage threshold
# NENHUM job usa continue-on-error:true ou || true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # LINT — ruff
  # ============================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run ruff linter
        run: ruff check .

  # ============================================================================
  # TYPE CHECK — mypy
  # ============================================================================
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy type check
        run: mypy .

  # ============================================================================
  # TEST — pytest with coverage (exclui slow por default)
  # ============================================================================
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ --cov --cov-fail-under=10
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: docs/td-001/coverage-reports/
          retention-days: 14

  # ============================================================================
  # TEST ALL — inclui integration, smoke, slow (gate completo)
  # ============================================================================
  test-all:
    name: Test All (full suite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run ALL tests (no marker exclusions)
        run: pytest tests/ -m "" --cov --cov-fail-under=10
        env:
          CI: true

  # ============================================================================
  # SECURITY — bandit (fail-closed, sem continue-on-error)
  # ============================================================================
  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run bandit security scan
        run: bandit -r scripts/ -f json --quiet

  # ============================================================================
  # DEPENDENCY AUDIT — pip-audit (fail-closed)
  # ============================================================================
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict
