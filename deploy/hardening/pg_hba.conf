# ============================================================================
# pg_hba.conf — PostgreSQL Client Authentication Configuration
# ============================================================================
#
# Technical Debt: TD-SEC-02 (MEDIUM)
# Story: TD-5.4 — Hardening de Seguranca
#
# Este arquivo documenta a configuracao de autenticacao recomendada para o
# PostgreSQL rodando na Hetzner VPS (porta 54399).
#
# NENHUMA entrada deve usar 'trust' (autenticacao sem senha).
# NENHUMA entrada remota deve usar 'password' (senha em texto claro).
#
# Localizacao tipica: /etc/postgresql/16/main/pg_hba.conf
# Apos modificar: sudo systemctl reload postgresql
# ============================================================================

# -----------------------------------------------------------------------
# CONEXOES LOCAIS (socket Unix)
# -----------------------------------------------------------------------
# Conexoes via socket Unix sao confiaveis por padrao (acesso root required).
# Para ambientes de producao, recomenda-se 'peer' (autentica pelo usuario
# do SO) ou 'scram-sha-256' para maior seguranca.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Acesso local do usuario postgres (backups, manutencao)
local   all             postgres                                peer

# Acesso local dos demais usuarios via socket Unix
local   all             all                                     scram-sha-256

# -----------------------------------------------------------------------
# CONEXOES VIA TCP/IP (localhost)
# -----------------------------------------------------------------------
# Conexoes originadas do proprio servidor (ex: scripts locais).

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Acesso via localhost (127.0.0.1 e ::1) — seguro para conexoes locais
hostssl all             all             127.0.0.1/32            scram-sha-256
hostssl all             all             ::1/128                 scram-sha-256

# -----------------------------------------------------------------------
# CONEXOES VIA TCP/IP (rede interna)
# -----------------------------------------------------------------------
# Conexoes originadas de servidores confiaveis na mesma rede.
# Descomente e ajuste o endereco conforme a topologia de rede.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Rede interna VPS (ex: 10.0.0.0/8 para VLAN interna)
# hostssl all          all             10.0.0.0/8              scram-sha-256

# -----------------------------------------------------------------------
# CONEXOES VIA TCP/IP (aplicacoes externas autorizadas)
# -----------------------------------------------------------------------
# Aplicacoes que precisam de acesso remoto ao banco.
# Cada aplicacao deve ter sua propria entrada com IP fixo.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Exemplo: servidor de aplicacao
# hostssl all          all             203.0.113.10/32         scram-sha-256

# -----------------------------------------------------------------------
# NEGAR ACESSO A QUALQUER OUTRA ORIGEM (default)
# -----------------------------------------------------------------------
# Esta entrada deve ser a ULTIMA e bloqueia qualquer conexao que nao
# corresponda a uma entrada anterior. Essencial para seguranca.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Bloqueia conexoes de qualquer outra origem
hostnossl all            all             0.0.0.0/0               reject
hostnossl all            all             ::/0                    reject
hostssl  all            all             0.0.0.0/0               reject
hostssl  all            all             ::/0                    reject

# ============================================================================
# VERIFICACAO DE SEGURANCA
# ============================================================================
#
# Apos aplicar este arquivo, verifique:
#
# 1. Nenhuma linha contem 'trust':
#      sudo grep -n 'trust' /etc/postgresql/*/main/pg_hba.conf
#    Se retornar algo, as entradas trust precisam ser removidas.
#
# 2. Apenas 'scram-sha-256' ou 'peer' como metodos:
#      sudo grep -v '^#' /etc/postgresql/*/main/pg_hba.conf | grep -E '(host|local)'
#
# 3. Nenhuma conexao remota sem SSL (hostnossl) esta liberada:
#      sudo grep 'hostnossl' /etc/postgresql/*/main/pg_hba.conf | grep -v 'reject'
#
# 4. Configuracao esta sintaticamente correta:
#      sudo pg_isready
#      sudo -u postgres psql -c "SELECT 1"
#
# 5. Testar conexao com senha incorreta (deve falhar):
#      PGPASSWORD=wrong psql -h localhost -p 54399 -U postgres -c "SELECT 1"
#
# 6. Testar conexao sem SSL (deve ser rejeitada):
#      psql "sslmode=disable host=localhost port=54399 dbname=postgres"
# ============================================================================
