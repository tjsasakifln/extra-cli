# ============================================================================
# fail2ban Jail Configuration — PostgreSQL Hardening
# ============================================================================
#
# Technical Debt: TD-SEC-02 (MEDIUM)
# Story: TD-5.4 — Hardening de Seguranca
#
# Instalacao:
#   1. Copiar para /etc/fail2ban/jail.d/postgresql.conf
#   2. sudo systemctl restart fail2ban
#
# Teste:
#   sudo fail2ban-client status postgresql
#
# Monitoramento:
#   sudo tail -f /var/log/fail2ban.log
#   sudo fail2ban-client set postgresql banip <IP>
#   sudo fail2ban-client set postgresql unbanip <IP>
# ============================================================================

[postgresql]

# Ativar esta jail
enabled = true

# Porta customizada do PostgreSQL (54399, nao o default 5432)
port = 54399

# Caminho do log do PostgreSQL
logpath = /var/log/postgresql/postgresql-16-main.log

# Numero maximo de tentativas falhas antes do bloqueio
maxretry = 5

# Tempo de bloqueio em segundos (1 hora = 3600s)
bantime = 3600

# Janela de tempo para contar tentativas (em segundos)
# 5 tentativas falhas em 10 minutos = bloqueio
findtime = 600

# IPs que nunca serao bloqueados (whitelist)
# Incluir IPs internos, VPN, e servidores de monitoramento
ignoreip = 127.0.0.1/8 ::1

# Modo de bloqueio: deny (recomendado para UFW)
# Alternativas: iptables, nftables (depende do firewall em uso)
banaction = ufw

# Acao apos desbloqueio automatico
action = %(action_)s

# Formato de log para PostgreSQL (log_line_prefix = '%m [%p] ')
logtype = postgresql

# Regex para identificar tentativas de autenticacao falhas
# Formato tipico: FATAL: password authentication failed for user "XXX"
failregex = ^%(__prefix_line)sFATAL:  password authentication failed for user ".+"$

# Regex para ignorar (logs de manutencao, etc.)
ignoreregex =

# Notificacoes
sendmail-whois-lines = 5

# ============================================================================
# Observacoes
# ============================================================================
#
# 1. O parametro logpath deve corresponder a versao do PostgreSQL instalada.
#    Para PG 15: /var/log/postgresql/postgresql-15-main.log
#    Para PG 17: /var/log/postgresql/postgresql-17-main.log
#
# 2. Para que o fail2ban consiga ler os logs, o PostgreSQL deve estar
#    configurado com log_line_prefix incluindo %m (timestamp) e [%p] (PID).
#    Adicione em postgresql.conf:
#      log_line_prefix = '%m [%p] '
#      log_password_auth = 'true'
#
# 3. Teste o regex de falha com:
#    fail2ban-regex /var/log/postgresql/postgresql-16-main.log \
#      '^FATAL:  password authentication failed for user ".+"$'
#
# 4. Para desbloquear manualmente um IP:
#    sudo fail2ban-client set postgresql unbanip <IP_BLOQUEADO>
#
# 5. Para ver estatisticas de bloqueio:
#    sudo fail2ban-client status postgresql
# ============================================================================
