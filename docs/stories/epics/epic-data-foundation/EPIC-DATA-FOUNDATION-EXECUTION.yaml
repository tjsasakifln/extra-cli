        dlq_write routes failed records to dlq_entries table;
        dlq_replay re-processes entries; dlq_purge auto-purges based
        on TTL; CLI commands via monitor.py (--dlq-list, --dlq-replay,
        --dlq-purge). Max payload: 100KB with truncation flag
        (from FR-2.1 amendment).
      file: "df-101-dlq-core.story.md"
      executor: "@dev"
      quality_gate: "@architect"
      quality_gate_tools:
        - code_review
        - integration_test
        - data_integrity
      complexity: "M"
      priority: "MUST"
      effort_hours: 6
      acceptance_criteria:
        - "Given a failed record, dlq_write routes it to dlq_entries with source, run_id, phase, payload, error_code"
        - "Given a failed record, payload is truncated at 100KB with truncation_flag=true"
        - "Given DLQ entries, --dlq-list shows entries filtered by source"
        - "Given DLQ entries, --dlq-replay re-processes entries and updates replayed_at"
        - "Given DLQ entries older than TTL, --dlq-purge removes them"
        - "Given NFR-4.1, DLQ write overhead is < 5% of total crawl time"
      test_requirements:
        - "30+ unit tests for DLQ logic (write, replay, purge, truncation)"
        - "10 integration tests for DLQ end-to-end"
