  # ============================================================
  # WAVE DEFINITIONS (6 waves, 22 stories)
  # ============================================================
  waves:

    - wave: 0
      name: "Foundation — Specs + ADRs + Baseline + DB"
      description: >
        Establish the foundation before any code changes: measure
        current performance (baseline), document architecture decisions,
        create database tables. Sequential because ADRs inform migration
        design and baseline must precede implementation.
      gate_agent: "@architect"
      parallel: false
      stories:
        - DF-001
        - DF-002
        - DF-003
      merge:
        order:
          - "feat/df-001-baseline-benchmark"
          - "feat/df-002-adr-technical-design"
          - "feat/df-003-data-layer-migration"
        conflict_risk: "very low"
        notes: "Stories are additive (new docs, new migrations). No conflict expected."
        tag: "wave-0-complete"

    - wave: 1
      name: "Core Engine — DLQ, Watermark, Provenance, Dedup, Resilience"
      description: >
        Implement the four core data layer modules (DLQ, watermark,
        provenance, dedup) and engine resilience (kill/resume,
        fail-closed). All 5 stories run in parallel because they
        write to exclusive file sets. Wave gate validates
        cross-module integration.
      gate_agent: "@architect"
      parallel: true
      max_concurrency: 4
      stories:
        - DF-101
        - DF-102
        - DF-103
        - DF-104
        - DF-105
      merge:
        order:
          - "feat/df-102-watermark-engine"
          - "feat/df-101-dlq-core"
          - "feat/df-103-provenance-tracking"
          - "feat/df-104-dedup-pipeline"
          - "feat/df-105-engine-resilience"
        conflict_risk: "low"
        notes: >
          All stories write to exclusive module files (no file overlap).
          Merge in dependency order: watermark -> DLQ -> provenance ->
          dedup -> engine (engine imports all other modules).
        tag: "wave-1-complete"

    - wave: 2
      name: "Source Adapters — DLQ + Watermark per Fonte"
      description: >
        Integrate DLQ, watermark, and provenance into each source
        adapter. Each source has its own worktree. 4 sources in
        parallel: PNCP (critical, Phase C stub replacement), PCP,
        ComprasGov, and remaining sources (CIGA/TCE/DOE/DOM).
      gate_agent: "@qa"
      parallel: true
      max_concurrency: 4
      worktree_per_story: true
      stories:
        - DF-201
        - DF-202
        - DF-203
        - DF-204
      merge:
        order:
          - "feat/df-201-pncp-adapter-dlq"
          - "feat/df-203-comprasgov-adapter-dlq"
          - "feat/df-202-pcp-client-dlq"
          - "feat/df-204-remaining-sources-provenance"
        conflict_risk: "medium"
        notes: >
          Each story touches different source directories: no file
          overlap. PNCP is the essential source; gate review must
          validate DLQ paths. Base client already replaced in Wave 1.
        tag: "wave-2-complete"

    - wave: 3
      name: "Backfill 3 Years + Coverage Truth + Stub Phase B"
      description: >
        Complete stub replacement (Phase B: redis_pool + supabase_client),
        implement freshness evaluator integrated with coverage state
        machine, and execute 3-year backfill for all P0 sources with
        watermark commits. Sequential because infrastructure must
        precede backfill, and freshness depends on backfill data.
      gate_agent: "@qa"
      parallel: false
      stories:
        - DF-301
        - DF-302
        - DF-303
      merge:
        order:
          - "feat/df-301-stub-phase-b-redis-supabase"
          - "feat/df-302-freshness-coverage"
          - "feat/df-303-backfill-3yr-coverage"
        conflict_risk: "low"
        notes: >
          Sequential: Redis/Supabase replacement -> Freshness -> Backfill.
          Backfill executes on production data. @qa verifies coverage
          truth after backfill.
        tag: "wave-3-complete"

    - wave: 4
      name: "Chaos + Tests + Code Audit"
      description: >
        Quality wave: chaos test suite (35 tests across 7 scenarios),
        kill/resume integration tests (5 tests), unit test coverage
        for all modules (95+ tests), and final code audit for zero
        stubs. All stories in parallel because they write to exclusive
        test files.
      gate_agent: "@architect"
      parallel: true
      max_concurrency: 4
      stories:
        - DF-401
        - DF-402
        - DF-403
        - DF-404
      merge:
        order:
          - "feat/df-401-chaos-test-suite"
          - "feat/df-402-kill-resume-integration"
          - "feat/df-403-unit-test-coverage"
          - "feat/df-404-code-audit-stub-verification"
        conflict_risk: "low"
        notes: >
          All stories write to different test directories: tests/chaos/*
          vs tests/integration/* vs tests/unit/*. No file overlap.
          Code audit is read-only across codebase.
        tag: "wave-4-complete"

    - wave: 5
      name: "Final Integration — Regressão, Documentação, Release"
      description: >
        Final integration wave: full regression suite (140+ new and
        1326 existing tests), documentation and changelog, final
        release. Sequential because documentation depends on regression
        passing, and release depends on both.
      gate_agent: "@qa"
      parallel: false
      stories:
        - DF-501
        - DF-502
        - DF-503
      merge:
        order:
          - "feat/df-501-full-regression-suite"
          - "feat/df-502-documentation-changelog"
          - "main (final PR)"
        conflict_risk: "low"
        notes: >
          Sequential: Regression -> Documentation -> Release.
          DF-503 (@devops) is the final gate for PR creation and push.
          Pre-push checklist executed before merge.
        tag: "wave-5-complete"

  # ============================================================
  # FINAL GATE
  # ============================================================
  final_gate:
    agent: "@architect"
    tag: "data-foundation-v1.0-complete"
    focus: >
      Full epic-level audit: verify all waves complete, all gates
      APPROVED, all 22 stories Done, all evidence files exist.
      Validate the data foundation is production-grade: DLQ never
      loses data, watermark enables resume, provenance tracks every
      run, dedup prevents duplicates, kill/resume works, all stubs
      replaced, chaos tests pass.
    checks:
      - "All 6 waves completed with APPROVED gates"
      - "All 22 stories status=Done"
      - "Zero stubs remaining in codebase (NFR-5.1)"
      - "DLQ, watermark, provenance, dedup tables exist and are populated"
      - "Kill/resume integration tests pass (5/5)"
      - "Chaos suite passes (35/35)"
      - "Full regression: 1326 + 140 tests pass"
      - "Baseline performance parity confirmed (NFR-4.3)"
      - "Coverage truth documented with per-source status"
      - "All 6 ADRs created and approved"

  # ============================================================
  # DEFINITION OF DONE
  # ============================================================
  definition_of_done:
    - "DLQ table exists with write/replay/purge lifecycle; failed records never silently lost"
    - "All 11 sources have page-level or date-level watermarks; --resume works per source"
    - "Every crawl run produces a provenance record queryable by source/run_id/status"
    - "Central dedup prevents duplicate records across all sources"
    - "SIGTERM handler enables graceful shutdown within 30s at page boundary"
    - "All 6 stub modules replaced with real implementations"
    - "Chaos test suite: 35 tests across 7 failure scenarios, all passing"
    - "Kill/resume integration: 5 tests passing, exactly-once semantics verified"
    - "Freshness evaluator integrated with coverage state machine"
    - "Zero regression in existing 1326 tests"
    - "New module test coverage >= 80% each; type annotations on all public functions"
    - "Baseline performance parity confirmed"
    - "All 6 ADRs created, reviewed, and approved"
    - "Operations guide documents all new CLI commands with examples"
    - "Coverage truth documented with per-source status after 3-year backfill"

  # ============================================================
  # RISK ASSESSMENT
  # ============================================================
  risk_assessment:
    overall: "HIGH-RISK"
    rationale: >
      This mission touches database migrations, data integrity,
      production crawl pipeline, and replaces 6 stub modules.
      It introduces new database tables and changes the crawl
      lifecycle. Per AIOX protocol, HIGH-RISK requires @architect
      review on all architectural stories and strict gate enforcement.
    risks:
      - risk: "Stub replacement breaks existing imports"
        probability: "Medium"
        impact: "High"
        mitigation: "Backward-compatible imports; full test suite before/after each replacement; Phase A/B/C staggering per critique recommendation"
        owner: "@dev"
      - risk: "DLQ table grows unbounded"
        probability: "Medium"
        impact: "Low"
        mitigation: "Auto-purge TTL policy; --dlq-purge command; monitoring on dlq_count"
        owner: "@data-engineer"
      - risk: "Kill/resume leaves inconsistent state"
        probability: "Low"
        impact: "Critical"
        mitigation: "WAL-style watermark commit before data writes; 5 integration tests with real signals"
        owner: "@dev + @qa"
      - risk: "Performance regression from DLQ writes"
        probability: "Medium"
        impact: "Medium"
        mitigation: "Baseline benchmark before impl; NFR-4.1 < 5% overhead target; async DLQ writes where possible"
        owner: "@dev"
      - risk: "Existing 1326 tests regress"
        probability: "Medium"
        impact: "High"
        mitigation: "All new features opt-in (backward compatible); G-9.6 blocks merge on regression; Wave 5 regression suite"
        owner: "@qa"
      - risk: "Migration conflicts with existing 50 migrations"
        probability: "Medium"
        impact: "High"
        mitigation: "New tables only (no ALTER); FK validation against existing schema; ADR-reviewed migration"
        owner: "@data-engineer"
      - risk: "PNCP essential source degraded without fresh data"
        probability: "Low"
        impact: "High"
        mitigation: "PNCP adapter changes are opt-in (backward compatible); Wave 2 validates with existing test suite before merges"
        owner: "@dev"

