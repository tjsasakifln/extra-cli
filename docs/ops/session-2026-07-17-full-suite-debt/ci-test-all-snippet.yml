  # ============================================================================
  # TEST ALL — inclui integration, smoke, slow (gate completo)
  # ============================================================================
  test-all:
    name: Test All (full suite)
    # The legacy/integration suite requires external services and still has
    # tracked debt. Keep it fail-closed, but run it only when explicitly
    # requested until its environment is provisioned in CI.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run ALL tests (no marker exclusions)
        run: pytest tests/ -m "" --cov --cov-fail-under=10
        env:
          CI: true
