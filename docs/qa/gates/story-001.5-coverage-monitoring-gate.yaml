    status: "PASS"
    note: "Baseline implementada via cmd_coverage --baseline (report_coverage do monitor) + dashboard default (_fetch_dashboard_data com queries diretas por source e natureza juridica). Dashboard mostra cobertura total, por fonte, por natureza, top gaps e tendencia."
  ac2:
    status: "PASS"
    note: "v_coverage_gaps criada corretamente em migration 012 com NOT EXISTS filter para entes com is_covered=FALSE em todas as fontes."
  ac3:
    status: "PASS"
    note: "v_coverage_gaps_by_municipio criada com agregacao por municipio, entes_descobertos e pct_gap."
  ac4:
    status: "PASS"
    note: "v_coverage_trend criada com LAG() para variacao semanal, particionada por source."
  ac5:
    status: "PARTIAL"
    note: "Dashboard implementado com todos os elementos (cobertura total, gaps por municipio, gaps por natureza, gaps por fonte, tendencia). Mas a secao de tendencia nunca exibe dados devido ao bug WHERE source='total' (issue #1)."
  ac6:
    status: "PASS"
    note: "Tabela coverage_snapshots + funcao generate_coverage_snapshot() criadas em migration 012."
  ac7:
    status: "PASS"
    note: "coverage-report.service (calls 'coverage --snapshot --export') + coverage-report.timer (daily 09:00 UTC). Tambem coverage-report-weekly.service + timer (Mondays 08:00 UTC)."
  ac8:
    status: "PASS"
    note: "coverage_gaps.py exporta para Excel com 3 abas: detalhado, por municipio, resumo. Styling com openpyxl."

summary: "Story implementada com qualidade, 9/10 ACs plenamente atendidos. Um bug de severity MEDIUM na consulta de tendencia (source='total' inexistente) e dois itens LOW de melhoria. Nada que bloqueie o aceite, mas os itens devem ser endereçados em story subsequente."
