    status: "PASS"
    details: "Comandos CLI existentes (search, stats, supplier, pricing, competitors, detail) intactos. coverage e subcomando adicional, nao modificou signature dos existentes."
  performance:
    status: "CONCERNS"
    details: "Indices existentes em entity_coverage (idx_cov_covered, idx_cov_source) e sc_public_entities (idx_spe_municipio, idx_spe_natureza) cobrem as queries. Views em 012 com indices adicionais (idx_cov_snap_date, idx_cov_snap_source). Nao ha materialized view - aceitavel para 2.085 entes x 7 fontes."
