issues:
  - severity: medium
    category: code
    description: "Bug na query de trend do dashboard: hardcoded 'source = 'total'' mas nenhum snapshot com source='total' e gerado. generate_coverage_snapshot() insere apenas por source individual (PNCP, TCE-SC, etc.). Resultado: secao de tendencia no dashboard sempre vazia, mesmo com snapshots historicos."
    recommendation: "Corrigir _fetch_dashboard_data() para calcular o total agregado. Opcao A: inserir tambem uma linha com source='total' na generate_coverage_snapshot(). Opcao B: modificar a query de trend para agregar todas as fontes via SUM/AVG em vez de filtrar por source='total'."
    file: "scripts/local_datalake.py:419-427"
    fix: "ALTERNATIVE B (recomendada): Substituir WHERE source = 'total' por agregação: SELECT snapshot_date, ROUND(AVG(pct_covered), 1) AS pct_covered, ... FROM v_coverage_trend GROUP BY snapshot_date ORDER BY snapshot_date DESC LIMIT 4"

  - severity: low
    category: code
    description: "ON CONFLICT DO NOTHING em generate_coverage_snapshot() e inoperante — nao ha UNIQUE constraint em coverage_snapshots. Execucoes repetidas no mesmo dia criam linhas duplicadas, poluindo o trend."
    recommendation: "Adicionar UNIQUE (snapshot_date, source) a tabela coverage_snapshots, ou usar INSERT ... ON CONFLICT (snapshot_date, source) DO NOTHING / DO UPDATE."
    file: "db/migrations/012_coverage_snapshots.sql:10-18 e linha 142"

  - severity: low
    category: docs
    description: "Risco documentado ('Snapshot crescer indefinidamente — Purge > 365 dias no pncp-purge.timer') nao foi implementado. pncp-purge.service chama purge_old_records(400) que nao abrange coverage_snapshots."
    recommendation: "Adicionar cleanup de coverage_snapshots no pncp-purge.service ou criar purge dedicado. Ex.: DELETE FROM coverage_snapshots WHERE snapshot_date < CURRENT_DATE - INTERVAL '365 days'."
    file: "deploy/systemd/pncp-purge.service"

